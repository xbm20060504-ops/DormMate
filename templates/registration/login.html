<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DormMate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: linear-gradient(135deg, #0F172A 0%, #6366F1 50%, #F97316 100%);
               min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 20px; padding: 2.5rem;
                      width: 100%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,0.3); }
        .brand { font-size: 1.8rem; font-weight: 800; color: #0F172A; text-align: center; }
        .brand i { color: #F97316; }
        .form-control { border-radius: 10px; padding: 0.75rem 1rem; }
        .btn-primary { background: #6366F1; border: none; border-radius: 10px; padding: 0.75rem;
                       font-weight: 700; letter-spacing: -0.3px; }
        .btn-primary:hover { background: #4F46E5; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand"><i class="bi bi-house-heart-fill"></i> DormMate</div>
        <p class="text-center text-muted mb-4" style="font-size:0.9rem;">Smart Dormitory Management</p>
        {% if form.errors %}
        <div class="alert alert-danger" style="font-size:0.85rem;border-radius:10px;">Invalid username or password.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>
        </form>
        <p class="text-center mb-0" style="font-size:0.88rem;">
            Don't have an account? <a href="{% url 'register' %}" style="color:#6366F1;font-weight:700;">Sign Up</a>
        </p>
    </div>
</body>
</html>
